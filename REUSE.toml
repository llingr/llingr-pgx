version = 1

# Bulk annotation for files that cannot or should not carry in-file SPDX
# headers (structured configs, prose, attribution files, test fixtures).
# Extension and testdata wildcards rather than per-path entries, so package
# renames cannot orphan a path. precedence = "closest" keeps any in-file
# header authoritative.
[[annotations]]
path = [
    ".github/**",
    ".gitignore",
    "AUTHORS",
    "COPYRIGHT",
    "Makefile",
    "NOTICE",
    "**/*.md",
    "**/*.mod",
    "**/*.sum",
    "**/*.sql",
    "**/*.yml",
    "**/*.yaml",
    "**/testdata/**",
    "tests/docker/**",
]
precedence = "closest"
SPDX-FileCopyrightText = "Copyright (c) 2026 The llingr-pgx Authors"
SPDX-License-Identifier = "Apache-2.0"
