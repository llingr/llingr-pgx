name: Lint

on:
  workflow_call:

permissions:
  contents: read

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
