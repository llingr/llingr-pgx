name: CodeQL

on:
  # Called by the Pipeline orchestrator on push/PR; runs standalone on the
  # weekly cron so scans keep landing between commits.
  workflow_call:
  schedule:
    - cron: '45 4 * * 2'

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: go
          build-mode: autobuild
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"
