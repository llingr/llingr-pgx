name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Both modules (root library and tests/) declare go 1.25.0 with no toolchain
  # bump, so a single version covers every job. govulncheck needs Go >= 1.25.
  GO_VERSION: '1.25'

jobs:
  build:
    name: build & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go build ./...
      - run: go vet ./...

  test:
    name: test (race + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # Library unit tests only: no Docker, fast. The Docker-backed migration test
      # lives in the tests/ module and runs in the integration workflow.
      - name: Tests
        run: go test -race -coverprofile=coverage.out -coverpkg=./... ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -5
      # Skipped under nektos/act (which sets env.ACT=true): Codecov needs a real
      # GitHub OIDC token / CODECOV_TOKEN that only exists on GitHub-hosted runners.
      # Runs normally in GitHub Actions.
      - uses: codecov/codecov-action@v7
        if: ${{ !env.ACT }}
        with:
          files: coverage.out
          flags: unit
          fail_ci_if_error: false
