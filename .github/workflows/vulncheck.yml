name: Vulncheck

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '45 5 * * 2'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          # newest toolchain so the scan sees current stdlib security patches
          go-version: 'stable'
          check-latest: true
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      # Library only: the tests/ module deliberately carries the CVE-prone testcontainers
      # dependencies not used in the actual library code so it is not scanned.
      - run: govulncheck ./...
