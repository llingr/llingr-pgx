name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  build:
    # trusted builder: signs attestations, cannot write to the repo
    uses: ./.github/workflows/release-build.yml
    permissions:
      contents: read
      id-token: write
      attestations: write

  publish:
    # publisher: creates the release, cannot sign attestations
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          name: release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          -R "${GITHUB_REPOSITORY}"
          --verify-tag
          --title "${GITHUB_REF_NAME}"
          --generate-notes
          "llingr-pgx_${GITHUB_REF_NAME}.tar.gz"
          "llingr-pgx_${GITHUB_REF_NAME}.cdx.json"
          "llingr-pgx_${GITHUB_REF_NAME}.spdx.json"
